{% extends 'base.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="bi bi-shield-check" style="font-size:3rem;color:#F97316;"></i>
            <h3 class="fw-bold mt-2">IPERC Digital</h3>
            <p class="text-muted">Sistema SST · Cajamarca 2026</p>
        </div>
        <div class="card shadow">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">Iniciar Sesión</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">DNI</label>
                        <input type="text" name="dni" class="form-control" 
                               placeholder="12345678" required maxlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Ingresar
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <small>¿No tienes cuenta? 
                        <a href="{{ url_for('auth.registro') }}">Regístrate aquí</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
