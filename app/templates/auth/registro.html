{% extends 'base.html' %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <i class="bi bi-shield-check" style="font-size:3rem;color:#F97316;"></i>
            <h3 class="fw-bold mt-2">IPERC Digital</h3>
            <p class="text-muted">Crear cuenta de trabajador</p>
        </div>
        <div class="card shadow">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">Registro</h5>
                <form method="POST" autocomplete="off">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" 
                               placeholder="Carlos" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" name="apellido" class="form-control" 
                               placeholder="Quispe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">DNI</label>
                        <input type="text" name="dni" class="form-control" 
                               placeholder="12345678" required maxlength="8">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" name="email" class="form-control" 
                            placeholder="ejemplo@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cargo</label>
                        <select name="cargo_id" class="form-select" required>
                            <option value="">-- Seleccionar --</option>
                            {% for cargo in cargos %}
                            <option value="{{ cargo.id }}">{{ cargo.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Obra</label>
                        <select name="obra_id" class="form-select" required>
                            <option value="">-- Seleccionar --</option>
                            {% for obra in obras %}
                            <option value="{{ obra.id }}">{{ obra.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-person-plus"></i> Registrarme
                    </button>
                </form>
                <hr>
                <div class="text-center">
                    <small>¿Ya tienes cuenta? 
                        <a href="{{ url_for('auth.login') }}">Inicia sesión</a>
                    </small>
                </div>
            </div>
        </div>
    </div>

</div>
{% endblock %}
